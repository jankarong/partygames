<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="text-center mb-4">
                <img src="WouldYouRatherLogo.png" alt="どっちを選ぶ？" class="img-fluid" style="max-width: 200px;">
            </div>
            <h1 class="text-center mb-5 display-4">どっちを選ぶ？</h1>
            <div class="row justify-content-center align-items-center g-2 mt-4">
                <div class="col-md-5 d-flex justify-content-center">
                    <div class="card option w-100" id="optionA">
                        <div class="card-body d-flex flex-column justify-content-center text-center p-4">
                            <p class="card-text mb-0" id="optionAText"></p>
                            <div class="percentage mt-2" id="percentageA">0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 d-flex justify-content-center">
                    <div class="text-center vs">VS</div>
                </div>
                <div class="col-md-5 d-flex justify-content-center">
                    <div class="card option w-100" id="optionB">
                        <div class="card-body d-flex flex-column justify-content-center text-center p-4">
                            <p class="card-text mb-0" id="optionBText"></p>
                            <div class="percentage mt-2" id="percentageB">0%</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-center mt-3">
                <button id="nextQuestion" class="btn btn-lg px-4">次の質問</button>
            </div>
        </div>
    </div>
</div>
<section class="game-info container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <article class="mb-5">
                <h2 class="h3 mb-4">どんなゲーム？</h2>
                <p>「どっちを選ぶ？」は、二つの選択肢から必ず一つを選ぶだけのシンプルな会話ゲームです。答えそのものよりも、その理由を話すと盛り上がります。</p>
            </article>
            <article class="mb-5">
                <h2 class="h3 mb-4">遊び方</h2>
                <div class="game-rules">
                    <ol>
                        <li>参加者で順番に質問を読みます。</li>
                        <li>二つの選択肢のうち、必ずどちらか一つを選びます。</li>
                        <li>なぜその答えを選んだのかを一言添えると楽しくなります。</li>
                        <li>「次の質問」でどんどん進めていきます。</li>
                    </ol>
                </div>
            </article>
            <article class="mb-5">
                <h2 class="h3 mb-4">盛り上がるポイント</h2>
                <div class="benefits">
                    <ul>
                        <li>初対面でも話しやすい</li>
                        <li>価値観の違いが見えて会話が広がる</li>
                        <li>道具なしで今すぐ遊べる</li>
                        <li>2人でもグループでも使いやすい</li>
                    </ul>
                </div>
            </article>
        </div>
    </div>
</section>
